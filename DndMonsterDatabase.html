<!DOCTYPE html>
<html lang="en" class="page-dnd-monster-database">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Man's D&D Toolbox (v1.1)</title>
        <link rel="stylesheet" href="img/stylesheet.css">
</head>
<body>
<main class="app">
    <div class="mode-switcher">
        <label class="mode-label" for="rulesetSwitch">Mode</label>
        <select id="rulesetSwitch" class="mode-select" onchange="window.location.href=this.value">
            <option value="DndMonsterDatabase.html" selected>D&amp;D 5E</option>
            <option value="PathfinderMonsterDatabase.html">Pathfinder</option>
        </select>
    </div>
    <div class="tabs">
        <select id="toolSwitch" class="mode-select" onchange="window.location.href=this.value">
            <option value="DndDiceRoller.html">Dice Roller</option>
            <option value="DndCoinConverter.html">Coin Converter</option>
            <option value="DndCharacterSheetCreator.html">Character Sheet</option>
            <option value="DndInitiativeTracker.html">Initiative</option>
            <option value="DndMonsterDatabase.html" selected>Monster Database (WIP)</option>
            <option value="DndSpellbook.html">Spellbook (WIP)</option>
        </select>
    </div>

    <section class="panel">
        <h1>Mii Man's D&D Toolbox</h1>
        <p class="subhead">Monster Database v1.0</p>
        <p class="wip-notice">Work in progress: the Monster Database is unfinished and may change.</p>
        <p id="databaseStatus" class="database-status">Loading monsters from JSON...</p>

        <div class="controls">
            <div>
                <label for="searchInput">Search Monsters</label>
                <input id="searchInput" type="text" placeholder="Goblin, dragon, undead, legendary...">
            </div>
            <div>
                <label for="typeFilter">Type</label>
                <select id="typeFilter">
                    <option value="all">All Types</option>
                </select>
            </div>
            <div>
                <label for="crFilter">Challenge Rating</label>
                <select id="crFilter">
                    <option value="all">All CRs</option>
                </select>
            </div>
            <div>
                <label for="sourceFilter">Source</label>
                <select id="sourceFilter">
                    <option value="all">All Sources</option>
                </select>
            </div>
            <div>
                <label for="sortField">Sort By</label>
                <select id="sortField">
                    <option value="name">Name</option>
                    <option value="challengeRating">Challenge Rating</option>
                    <option value="armorClass">Armor Class</option>
                    <option value="hitPoints">Hit Points</option>
                    <option value="type">Type</option>
                    <option value="source">Source</option>
                </select>
            </div>
            <div>
                <label for="sortDirection">Order</label>
                <select id="sortDirection">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
            </div>
            <button id="resetFiltersBtn" class="btn" type="button">Reset</button>
        </div>

        <div class="db-layout">
            <div class="monster-list">
                <div id="resultsMeta" class="results-meta"></div>
                <div id="monsterCards" class="monster-cards"></div>
            </div>

            <div class="monster-detail">
                <div id="monsterDetail"></div>
            </div>
        </div>
    </section>
</main>

<script>
const MONSTER_DATA_PATH = "img/DndMonsters5e.json";
const DICE_ROLLER_PATH = "DndDiceRoller.html";

const searchInput = document.getElementById("searchInput");
const typeFilter = document.getElementById("typeFilter");
const crFilter = document.getElementById("crFilter");
const sourceFilter = document.getElementById("sourceFilter");
const sortField = document.getElementById("sortField");
const sortDirection = document.getElementById("sortDirection");
const resetFiltersBtn = document.getElementById("resetFiltersBtn");
const resultsMeta = document.getElementById("resultsMeta");
const monsterCards = document.getElementById("monsterCards");
const monsterDetail = document.getElementById("monsterDetail");
const databaseStatus = document.getElementById("databaseStatus");

let baseMonsters = [];
let monsters = [];
let filteredMonsters = [];
let selectedMonsterId = "";
const CHALLENGE_XP = {
    "0": "0-10 XP",
    "1/8": "25 XP",
    "1/4": "50 XP",
    "1/2": "100 XP",
    "1": "200 XP",
    "2": "450 XP",
    "3": "700 XP",
    "4": "1,100 XP",
    "5": "1,800 XP",
    "6": "2,300 XP",
    "7": "2,900 XP",
    "8": "3,900 XP",
    "9": "5,000 XP",
    "10": "5,900 XP",
    "11": "7,200 XP",
    "12": "8,400 XP",
    "13": "10,000 XP",
    "14": "11,500 XP",
    "15": "13,000 XP",
    "16": "15,000 XP",
    "17": "18,000 XP",
    "18": "20,000 XP",
    "19": "22,000 XP",
    "20": "25,000 XP",
    "21": "33,000 XP",
    "22": "41,000 XP",
    "23": "50,000 XP",
    "24": "62,000 XP",
    "25": "75,000 XP",
    "26": "90,000 XP",
    "27": "105,000 XP",
    "28": "120,000 XP",
    "29": "135,000 XP",
    "30": "155,000 XP"
};

function getFieldValue(id) {
    const node = document.getElementById(id);
    return node ? node.value.trim() : "";
}

function splitLines(value) {
    return value.split("\n").map(function (item) {
        return item.trim();
    }).filter(Boolean);
}

function slugify(value) {
    return value.toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || `monster-${Date.now()}`;
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function normalizeMonster(monster) {
    const abilities = monster.abilities || {};
    return {
        id: String(monster.id || slugify(monster.name || "monster")),
        name: monster.name || "Unnamed Monster",
        size: monster.size || "-",
        type: monster.type || "-",
        alignment: monster.alignment || "-",
        armorClass: Number(monster.armorClass || 0),
        hitPoints: Number(monster.hitPoints || 0),
        hitDie: String(monster.hitDie || "").trim(),
        speed: monster.speed || "-",
        abilities: {
            strength: Number(abilities.strength || 0),
            dexterity: Number(abilities.dexterity || 0),
            constitution: Number(abilities.constitution || 0),
            intelligence: Number(abilities.intelligence || 0),
            wisdom: Number(abilities.wisdom || 0),
            charisma: Number(abilities.charisma || 0)
        },
        challengeRating: String(monster.challengeRating || "0"),
        traits: Array.isArray(monster.traits) ? monster.traits : splitLines(String(monster.traits || "")),
        actions: Array.isArray(monster.actions) ? monster.actions : splitLines(String(monster.actions || "")),
        source: monster.source || "Unknown",
        sourcePage: String(monster.sourcePage || monster.page || "").trim()
    };
}

function formatHitPoints(monster) {
    return monster.hitDie ? `${monster.hitPoints} (${escapeHtml(monster.hitDie)})` : String(monster.hitPoints);
}

function formatAbilityScore(score) {
    const modifier = Math.floor((Number(score || 0) - 10) / 2);
    const modifierText = modifier >= 0 ? `+${modifier}` : `${modifier}`;
    return `${score} (${modifierText})`;
}

function parseHitDieExpression(hitDie) {
    const normalized = String(hitDie || "").replace(/\s+/g, "");
    const match = normalized.match(/^(\d+)d(\d+)([+-]\d+)?$/i);
    if (!match) {
        return null;
    }
    return {
        count: Number(match[1]),
        sides: Number(match[2]),
        modifier: Number(match[3] || 0),
        formula: normalized.toLowerCase()
    };
}

function quickRollMarkup(monster) {
    const parsed = parseHitDieExpression(monster.hitDie);
    if (!parsed) {
        return "";
    }
    return `
        <button class="hp-roll-btn" type="button" data-hit-die="${escapeHtml(parsed.formula)}">
            Quick Roll
        </button>
    `;
}

function parseChallengeRating(value) {
    const text = String(value || "0").trim();
    if (text.includes("/")) {
        const parts = text.split("/");
        const numerator = Number(parts[0]);
        const denominator = Number(parts[1]);
        if (denominator) {
            return numerator / denominator;
        }
    }
    const numericValue = Number(text);
    return Number.isFinite(numericValue) ? numericValue : 0;
}

function formatChallengeRating(monster) {
    const challengeRating = String(monster.challengeRating || "0").trim();
    const xp = CHALLENGE_XP[challengeRating];
    return xp ? `CR ${challengeRating} (${xp})` : `CR ${challengeRating}`;
}

function compareText(left, right) {
    return String(left || "").localeCompare(String(right || ""), undefined, { numeric: true });
}

function compareMonsters(a, b) {
    let result = 0;

    switch (sortField.value) {
        case "challengeRating":
            result = parseChallengeRating(a.challengeRating) - parseChallengeRating(b.challengeRating);
            break;
        case "armorClass":
            result = a.armorClass - b.armorClass;
            break;
        case "hitPoints":
            result = a.hitPoints - b.hitPoints;
            break;
        case "type":
            result = compareText(a.type, b.type);
            break;
        case "source":
            result = compareText(a.source, b.source);
            break;
        case "name":
        default:
            result = compareText(a.name, b.name);
            break;
    }

    if (result === 0) {
        result = compareText(a.name, b.name);
    }

    return sortDirection.value === "desc" ? -result : result;
}

function syncMonsterList() {
    monsters = [...baseMonsters].sort(compareMonsters);
}

function uniqueValues(key) {
    return [...new Set(monsters.map(function (monster) {
        return monster[key];
    }))].sort(function (a, b) {
        return a.localeCompare(b, undefined, { numeric: true });
    });
}

function populateFilter(selectNode, key, label) {
    uniqueValues(key).forEach(function (value) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = `${label}: ${value}`;
        selectNode.appendChild(option);
    });
}

function rebuildFilters() {
    typeFilter.innerHTML = '<option value="all">All Types</option>';
    crFilter.innerHTML = '<option value="all">All CRs</option>';
    sourceFilter.innerHTML = '<option value="all">All Sources</option>';
    populateFilter(typeFilter, "type", "Type");
    populateFilter(crFilter, "challengeRating", "CR");
    populateFilter(sourceFilter, "source", "Source");
}

function matchesFilters(monster) {
    const searchTerm = searchInput.value.trim().toLowerCase();
    const searchHaystack = [
        monster.id,
        monster.name,
        monster.type,
        monster.alignment,
        monster.challengeRating,
        monster.hitDie,
        monster.source,
        monster.sourcePage,
        monster.traits.join(" "),
        monster.actions.join(" ")
    ].join(" ").toLowerCase();

    const matchesSearch = !searchTerm || searchHaystack.includes(searchTerm);
    const matchesType = typeFilter.value === "all" || monster.type === typeFilter.value;
    const matchesCr = crFilter.value === "all" || monster.challengeRating === crFilter.value;
    const matchesSource = sourceFilter.value === "all" || monster.source === sourceFilter.value;

    return matchesSearch && matchesType && matchesCr && matchesSource;
}

function renderMonsterCards() {
    monsterCards.innerHTML = "";

    if (!filteredMonsters.length) {
        monsterCards.innerHTML = '<div class="empty-state">No monsters match those filters yet.</div>';
        monsterDetail.innerHTML = '<div class="empty-state">Try broadening the search to see monster details.</div>';
        resultsMeta.textContent = "0 monsters found";
        return;
    }

    resultsMeta.textContent = `${filteredMonsters.length} monster${filteredMonsters.length === 1 ? "" : "s"} found`;

    filteredMonsters.forEach(function (monster) {
        const card = document.createElement("button");
        card.type = "button";
        card.className = `monster-card${monster.id === selectedMonsterId ? " active" : ""}`;
        card.innerHTML = `
            <div class="monster-card-top">
                <h2 class="monster-name">${escapeHtml(monster.name)}</h2>
                <span class="pill">${escapeHtml(formatChallengeRating(monster))}</span>
            </div>
            <p class="monster-meta">${escapeHtml(monster.size)} ${escapeHtml(monster.type)}, ${escapeHtml(monster.alignment)}</p>
            <div class="pill-row">
                <span class="pill">${escapeHtml(monster.source)}</span>
                <span class="pill">AC ${monster.armorClass}</span>
                <span class="pill">HP ${formatHitPoints(monster)}</span>
            </div>
        `;
        card.addEventListener("click", function () {
            selectedMonsterId = monster.id;
            renderMonsterCards();
            renderMonsterDetail();
        });
        monsterCards.appendChild(card);
    });
}

function renderMonsterDetail() {
    const selectedMonster = filteredMonsters.find(function (monster) {
        return monster.id === selectedMonsterId;
    }) || filteredMonsters[0];

    if (!selectedMonster) {
        monsterDetail.innerHTML = '<div class="empty-state">No monster selected.</div>';
        return;
    }

    selectedMonsterId = selectedMonster.id;

    monsterDetail.innerHTML = `
        <div class="detail-top">
            <div>
                <h2 class="detail-name">${escapeHtml(selectedMonster.name)}</h2>
                <p class="detail-meta">${escapeHtml(selectedMonster.size)} ${escapeHtml(selectedMonster.type)}, ${escapeHtml(selectedMonster.alignment)}</p>
            </div>
            <span class="pill">${escapeHtml(formatChallengeRating(selectedMonster))}</span>
        </div>

        <div class="pill-row">
            <span class="pill">${escapeHtml(selectedMonster.source)}</span>
            ${selectedMonster.sourcePage ? `<span class="pill">Page ${escapeHtml(selectedMonster.sourcePage)}</span>` : ""}
            <span class="pill">ID ${escapeHtml(selectedMonster.id)}</span>
        </div>

        <div class="detail-grid">
            <div class="stat-box"><span class="stat-label">Armor Class</span><div class="stat-value">${selectedMonster.armorClass}</div></div>
            <div class="stat-box">
                <span class="stat-label">Hit Points</span>
                <div class="stat-value">${formatHitPoints(selectedMonster)}</div>
                ${quickRollMarkup(selectedMonster)}
            </div>
            <div class="stat-box"><span class="stat-label">Speed</span><div class="stat-value">${escapeHtml(selectedMonster.speed)}</div></div>
            <div class="stat-box"><span class="stat-label">Challenge Rating</span><div class="stat-value">${escapeHtml(`${selectedMonster.challengeRating} (${CHALLENGE_XP[selectedMonster.challengeRating] || "XP unknown"})`)}</div></div>
        </div>

        <div class="detail-grid">
            <div class="stat-box"><span class="stat-label">STR</span><div class="stat-value">${formatAbilityScore(selectedMonster.abilities.strength)}</div></div>
            <div class="stat-box"><span class="stat-label">DEX</span><div class="stat-value">${formatAbilityScore(selectedMonster.abilities.dexterity)}</div></div>
            <div class="stat-box"><span class="stat-label">CON</span><div class="stat-value">${formatAbilityScore(selectedMonster.abilities.constitution)}</div></div>
            <div class="stat-box"><span class="stat-label">INT</span><div class="stat-value">${formatAbilityScore(selectedMonster.abilities.intelligence)}</div></div>
            <div class="stat-box"><span class="stat-label">WIS</span><div class="stat-value">${formatAbilityScore(selectedMonster.abilities.wisdom)}</div></div>
            <div class="stat-box"><span class="stat-label">CHA</span><div class="stat-value">${formatAbilityScore(selectedMonster.abilities.charisma)}</div></div>
        </div>

        <h3 class="section-title">Traits</h3>
        <p class="detail-text">${selectedMonster.traits.length ? selectedMonster.traits.map(escapeHtml).join("<br><br>") : "-"}</p>

        <h3 class="section-title">Actions</h3>
        <p class="detail-text">${selectedMonster.actions.length ? selectedMonster.actions.map(escapeHtml).join("<br><br>") : "-"}</p>
    `;
}

function applyFilters() {
    syncMonsterList();
    filteredMonsters = monsters.filter(matchesFilters);
    if (!filteredMonsters.some(function (monster) { return monster.id === selectedMonsterId; })) {
        selectedMonsterId = filteredMonsters[0] ? filteredMonsters[0].id : "";
    }
    renderMonsterCards();
    renderMonsterDetail();
}

function resetFilters() {
    searchInput.value = "";
    typeFilter.value = "all";
    crFilter.value = "all";
    sourceFilter.value = "all";
    sortField.value = "name";
    sortDirection.value = "asc";
    applyFilters();
}

async function loadMonsterData() {
    try {
        const response = await fetch(MONSTER_DATA_PATH);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        baseMonsters = Array.isArray(data) ? data.map(normalizeMonster) : [];
        syncMonsterList();
        rebuildFilters();
        selectedMonsterId = monsters[0] ? monsters[0].id : "";
        databaseStatus.textContent = `Loaded ${baseMonsters.length} 5E monsters from ${MONSTER_DATA_PATH}. Duplicate an entry in img/DndMonsterTemplate.json to add more in code.`;
        databaseStatus.classList.remove("error");
        applyFilters();
    } catch (error) {
        baseMonsters = [];
        syncMonsterList();
        rebuildFilters();
        selectedMonsterId = monsters[0] ? monsters[0].id : "";
        databaseStatus.textContent = "Could not load img/DndMonsters5e.json automatically. If you're opening the page directly from disk, run it through a local server so fetch() can read the JSON file.";
        databaseStatus.classList.add("error");
        applyFilters();
    }
}

searchInput.addEventListener("input", applyFilters);
typeFilter.addEventListener("change", applyFilters);
crFilter.addEventListener("change", applyFilters);
sourceFilter.addEventListener("change", applyFilters);
sortField.addEventListener("change", applyFilters);
sortDirection.addEventListener("change", applyFilters);
resetFiltersBtn.addEventListener("click", resetFilters);
monsterDetail.addEventListener("click", function (event) {
    const rollButton = event.target.closest(".hp-roll-btn");
    if (!rollButton) {
        return;
    }
    const params = new URLSearchParams({
        expr: rollButton.dataset.hitDie || "",
        autoroll: "1"
    });
    window.location.href = `${DICE_ROLLER_PATH}?${params.toString()}`;
});

loadMonsterData();
</script>
</body>
</html>
